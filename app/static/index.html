<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Database Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #fff; }
    p.sub { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .chat-box {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1e1e2e;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: #6c63ff; }
    button {
      padding: 14px 24px;
      border-radius: 10px;
      border: none;
      background: #6c63ff;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #574fd6; }
    button:disabled { background: #444; cursor: not-allowed; }
    .messages { display: flex; flex-direction: column; gap: 12px; }
    .msg {
      padding: 16px 20px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .msg.user {
      background: #1e1e2e;
      border: 1px solid #333;
      align-self: flex-end;
      max-width: 80%;
    }
    .msg.agent {
      background: #1a2636;
      border: 1px solid #2a3f55;
      align-self: flex-start;
      max-width: 90%;
    }
    .msg.agent .label { color: #6c63ff; font-weight: 600; margin-bottom: 6px; font-size: 0.8rem; }
    .msg.user .label { color: #aaa; font-weight: 600; margin-bottom: 6px; font-size: 0.8rem; }
    .sql-block {
      margin-top: 10px;
      background: #0d1117;
      border: 1px solid #2a3f55;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: #7ec8e3;
      white-space: pre-wrap;
    }
    .sql-label { font-size: 0.75rem; color: #555; margin-top: 8px; }
    .loading { color: #6c63ff; font-style: italic; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>AI Database Agent</h1>
  <p class="sub">Ask anything about your database in plain language</p>

  <div class="chat-box">
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <input id="input" type="text" placeholder="e.g. How many students are enrolled?" />
      <button id="sendBtn" onclick="sendQuestion()">Send</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const btn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendQuestion(); });

    function appendMsg(role, content, sql) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const label = role === 'user' ? 'YOU' : 'AGENT';
      let html = `<div class="label">${label}</div>${content}`;
      if (sql) {
        html += `<div class="sql-label">SQL used:</div><div class="sql-block">${sql}</div>`;
      }
      div.innerHTML = html;
      messages.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }

    async function sendQuestion() {
      const question = input.value.trim();
      if (!question) return;
      input.value = '';
      btn.disabled = true;

      appendMsg('user', question);

      const loading = document.createElement('div');
      loading.className = 'msg agent loading';
      loading.innerHTML = '<div class="label">AGENT</div>Thinking...';
      messages.appendChild(loading);

      try {
        const res = await fetch('/api/v1/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        loading.remove();
        if (!res.ok) {
          appendMsg('agent', `<span class="error">Error: ${data.detail}</span>`);
        } else {
          appendMsg('agent', data.answer, data.query_used);
        }
      } catch (e) {
        loading.remove();
        appendMsg('agent', `<span class="error">Connection error</span>`);
      }
      btn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
